<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://docs.getgrist.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; script-src 'self' 'unsafe-inline' https://docs.getgrist.com https://cdn.jsdelivr.net;">
    <title>Compteur de lignes</title>
    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>

    <!-- DSFR CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.1/dist/dsfr/dsfr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.1/dist/dsfr/utility/utilities.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.1/dist/utility/icons/icons.min.css">

    <style>
        body {
            margin: 0;
            padding: 1rem;
            background-color: var(--background-default-grey);
        }

        /* ── Vue normale ──────────────────────────────────────── */
        .counter-value {
            font-size: 3rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .counter-label {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* ── Vue configuration ────────────────────────────────── */
        #config {
            display: none;
            max-width: 480px;
        }

        /* ── Grille de swatches ───────────────────────────────── */
        .swatch-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .swatch {
            border-radius: 4px;
            border: 2px solid transparent;
            cursor: pointer;
            padding: 0.4rem 0.3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            transition: border-color 0.15s;
        }

        .swatch:hover   { border-color: var(--border-action-high-blue-france); }
        .swatch.selected { border-color: var(--border-action-high-blue-france); }

        .swatch-apercu {
            width: 100%;
            height: 20px;
            border-radius: 2px;
            border-left: 4px solid;
        }

        .swatch-nom {
            font-size: 0.65rem;
            text-align: center;
            color: var(--text-mention-grey);
        }

        /* ── Prévisualisation ─────────────────────────────────── */
        .preview-titre {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-mention-grey);
            margin-bottom: 0.5rem;
        }

        #previewCallout .counter-value { font-size: 2rem; }
    </style>
</head>
<body>

<!-- ── Vue normale ──────────────────────────────────────────────────────── -->
<div id="view">
    <div class="fr-callout" id="callout">
        <p class="fr-callout__title counter-value" id="rowCount">0</p>
        <p class="counter-label" id="rowLabel">Label</p>
    </div>
</div>

<!-- ── Vue configuration ────────────────────────────────────────────────── -->
<div id="config">

    <!-- Label -->
    <div class="fr-input-group">
        <label class="fr-label" for="labelInput">Label</label>
        <input class="fr-input" type="text" id="labelInput" placeholder="Ex. : Commandes en attente">
    </div>

    <!-- Couleur -->
    <fieldset class="fr-fieldset fr-mt-2w" id="colorFieldset">
        <legend class="fr-fieldset__legend fr-text--regular fr-mb-0">
            Couleur
        </legend>
        <div class="fr-fieldset__content">
            <div class="swatch-grid" id="swatchGrid"></div>
        </div>
    </fieldset>

    <!-- Prévisualisation -->
    <div class="fr-mt-3w">
        <p class="preview-titre">Prévisualisation</p>
        <div class="fr-callout" id="previewCallout">
            <p class="fr-callout__title counter-value" id="previewCount">42</p>
            <p class="counter-label" id="previewLabel">Label</p>
        </div>
    </div>

    <!-- Boutons -->
    <div class="fr-btns-group fr-btns-group--inline-sm fr-mt-3w">
        <button class="fr-btn" id="saveBtn">Enregistrer</button>
        <button class="fr-btn fr-btn--secondary" id="cancelBtn">Annuler</button>
    </div>

</div>

<!-- DSFR JS -->
<script src="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.1/dist/dsfr/dsfr.module.min.js" type="module"></script>
<script src="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.1/dist/dsfr/dsfr.nomodule.min.js" nomodule></script>

<script>
'use strict';

// ── Palette DSFR callout ───────────────────────────────────────────────────
const COULEURS = [
    { id: '',                    nom: 'Gris',      bg: '#f5f5fe', border: '#6a6af4' },
    { id: 'blue-france',         nom: 'Bleu',      bg: '#e8edff', border: '#000091' },
    { id: 'green-emeraude',      nom: 'Emeraude',  bg: '#b8fec9', border: '#00a95f' },
    { id: 'green-menthe',        nom: 'Menthe',    bg: '#c3faf4', border: '#009081' },
    { id: 'orange-terre-battue', nom: 'Orange',    bg: '#ffe9e6', border: '#e4794a' },
    { id: 'pink-macaron',        nom: 'Rose',      bg: '#fee7fc', border: '#d63b87' },
    { id: 'purple-glycine',      nom: 'Glycine',   bg: '#f0e4fd', border: '#a558d4' },
    { id: 'yellow-tournesol',    nom: 'Tournesol', bg: '#fef7da', border: '#c8aa39' },
];

// ── Module de sécurité ─────────────────────────────────────────────────────
function echapperHTML(texte) {
    if (!texte && texte !== 0) return '';
    const div = document.createElement('div');
    div.textContent = String(texte);
    return div.innerHTML;
}

function formaterNombre(nombre) {
    if (typeof nombre !== 'number' || isNaN(nombre)) return '0';
    return nombre.toLocaleString('fr-FR');
}

// ── État courant + snapshot pour annuler ───────────────────────────────────
let etatCourant            = { label: 'Label', couleurId: '' };
let snapshotAvantOuverture = null;

// ── Appliquer une couleur DSFR sur un fr-callout ───────────────────────────
function appliquerCouleur(el, couleurId) {
    COULEURS.forEach(function(c) {
        if (c.id) el.classList.remove('fr-callout--' + c.id);
    });
    if (couleurId) el.classList.add('fr-callout--' + couleurId);
}

// ── Construire la grille de swatches ──────────────────────────────────────
function construireSwatches() {
    var grid = document.getElementById('swatchGrid');
    COULEURS.forEach(function(couleur) {
        var sw = document.createElement('div');
        sw.className = 'swatch';
        sw.dataset.id = couleur.id;
        sw.setAttribute('title', couleur.nom);

        var apercu = document.createElement('div');
        apercu.className = 'swatch-apercu';
        apercu.style.backgroundColor = couleur.bg;
        apercu.style.borderLeftColor  = couleur.border;

        var nom = document.createElement('span');
        nom.className   = 'swatch-nom';
        nom.textContent = couleur.nom;

        sw.appendChild(apercu);
        sw.appendChild(nom);

        sw.addEventListener('click', function() {
            document.querySelectorAll('.swatch').forEach(function(s) {
                s.classList.remove('selected');
            });
            sw.classList.add('selected');
            mettreAJourPrevisualisation();
        });

        grid.appendChild(sw);
    });
}

// ── Lire la couleur sélectionnée ──────────────────────────────────────────
function getCouleurSelectionnee() {
    var sel = document.querySelector('.swatch.selected');
    return sel ? sel.dataset.id : '';
}

// ── Prévisualisation ──────────────────────────────────────────────────────
function mettreAJourPrevisualisation() {
    var label = document.getElementById('labelInput').value;
    document.getElementById('previewLabel').textContent = label || 'Label';
    appliquerCouleur(document.getElementById('previewCallout'), getCouleurSelectionnee());
}

// ── Ouvrir le panneau de configuration ───────────────────────────────────
function ouvrirConfig() {
    // Snapshot pour le vrai annuler
    snapshotAvantOuverture = { label: etatCourant.label, couleurId: etatCourant.couleurId };

    // Pré-remplir le formulaire
    document.getElementById('labelInput').value = etatCourant.label;

    // Synchroniser la swatch sélectionnée
    document.querySelectorAll('.swatch').forEach(function(sw) {
        sw.classList.toggle('selected', sw.dataset.id === etatCourant.couleurId);
    });

    mettreAJourPrevisualisation();

    document.getElementById('view').style.display   = 'none';
    document.getElementById('config').style.display = 'block';
}

// ── Fermer le panneau ─────────────────────────────────────────────────────
function fermerConfig() {
    document.getElementById('view').style.display   = 'block';
    document.getElementById('config').style.display = 'none';
}

// ── Enregistrer ───────────────────────────────────────────────────────────
function enregistrerOptions() {
    var label     = document.getElementById('labelInput').value || 'Label';
    var couleurId = getCouleurSelectionnee();

    grist.widgetApi.setOption('label',     label);
    grist.widgetApi.setOption('couleurId', couleurId);

    fermerConfig();
}

// ── Annuler — restaure l'état avant ouverture ─────────────────────────────
function annulerOptions() {
    if (snapshotAvantOuverture !== null) {
        appliquerOptions(snapshotAvantOuverture);
    }
    fermerConfig();
}

// ── Appliquer les options reçues de Grist ────────────────────────────────
function appliquerOptions(options) {
    options = options || {};
    etatCourant.label     = options.label     !== undefined ? options.label     : 'Label';
    etatCourant.couleurId = options.couleurId !== undefined ? options.couleurId : '';

    document.getElementById('rowLabel').textContent = echapperHTML(etatCourant.label);
    appliquerCouleur(document.getElementById('callout'), etatCourant.couleurId);
}

// ── DOMContentLoaded ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
    construireSwatches();

    document.getElementById('labelInput').addEventListener('input', mettreAJourPrevisualisation);
    document.getElementById('saveBtn').addEventListener('click', enregistrerOptions);
    document.getElementById('cancelBtn').addEventListener('click', annulerOptions);

    // Déclaration à Grist
    grist.ready({
        requiredAccess: 'read table',
        allowSelectBy:  true,
        onEditOptions: function() {
            ouvrirConfig();
        }
    });

    // Appelé au chargement et à chaque modification des options
    grist.onOptions(function(options) {
        appliquerOptions(options || {});
        fermerConfig();
    });

    // Mise à jour du compteur
    grist.onRecords(function(records) {
        var total = records ? records.length : 0;
        document.getElementById('rowCount').textContent = formaterNombre(total);
    });
});
</script>
</body>
</html>
